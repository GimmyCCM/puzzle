<!DOCTYPE html>

   <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字測驗</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .question-block {
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .options label {
            display: block;
            padding: 8px 10px;
            margin-bottom: 5px;
            background-color: #f9f9f9;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .options label:hover {
            background-color: #e9ecef;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #219150;
        }
        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }
        .correct-answer {
            color: #c0392b;
            font-size: 14px;
            display: none;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 英文單字小測驗</h1>
    <form id="quizForm">
        
        <div class="question-block">
            <div class="question">1. "Determine" 的中文意思是？</div>
            <div class="options">
                <label><input type="radio" name="q1" value="A"> (A) 決定</label>
                <label><input type="radio" name="q1" value="B"> (B) 延遲</label>
                <label><input type="radio" name="q1" value="C"> (C) 破壞</label>
                <label><input type="radio" name="q1" value="D"> (D) 發展</label>
            </div>
            <div id="ans1" class="correct-answer">正確答案是：(A) 決定</div>
        </div>

        <div class="question-block">
            <div class="question">2. "Significant" 的中文意思是？</div>
            <div class="options">
                <label><input type="radio" name="q2" value="A"> (A) 渺小的</label>
                <label><input type="radio" name="q2" value="B"> (B) 重要的 / 顯著的</label>
                <label><input type="radio" name="q2" value="C"> (C) 困難的</label>
                <label><input type="radio" name="q2" value="D"> (D) 隨機的</label>
            </div>
            <div id="ans2" class="correct-answer">正確答案是：(B) 重要的 / 顯著的</div>
        </div>

        <div class="question-block">
            <div class="question">3. "Abundant" 的中文意思是？</div>
            <div class="options">
                <label><input type="radio" name="q3" value="A"> (A) 缺乏的</label>
                <label><input type="radio" name="q3" value="B"> (B) 豐富的</label>
                <label><input type="radio" name="q3" value="C"> (C) 廢棄的</label>
                <label><input type="radio" name="q3" value="D"> (D) 絕對的</label>
            </div>
            <div id="ans3" class="correct-answer">正確答案是：(B) 豐富的</div>
        </div>

  </head>
  <body>
    

    <script src="./script.js"></script>
  </body>
</html>
