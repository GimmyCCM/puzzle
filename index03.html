<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 單字學習卡 - 智慧家教版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .flip-card { perspective: 1000px; height: 620px; }
        .flip-card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 1.5rem; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex; flex-direction: column; cursor: pointer;
        }
        .flip-card-front { 
            background-image: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1200&auto=format&fit=crop');
            background-size: cover; background-position: center;
            z-index: 2; transform: rotateY(0deg); 
            justify-content: center; align-items: center;
        }
        .flip-card-back { 
            transform: rotateY(180deg); 
            background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200&auto=format&fit=crop');
            background-size: cover; background-position: center;
            text-align: left; z-index: 1; cursor: default;
        }
        .glass-overlay {
            background: rgba(0, 0, 0, 0.65); 
            backdrop-filter: blur(5px);
            height: 100%; width: 100%;
            padding: 2.5rem 2rem; display: flex; flex-direction: column;
        }
        .btn-action { @apply flex flex-col items-center justify-center py-2 rounded-xl text-white font-bold text-xs transition-all active:scale-95 shadow-sm relative; }
        .key-hint { @apply absolute -top-2 -right-1 bg-white text-slate-800 w-5 h-5 rounded-full flex items-center justify-center border border-slate-200 shadow-sm text-[10px] font-black; }
        
        #aiResponse { transition: all 0.3s ease; }
        .ai-loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* 隱藏卷軸但可滾動 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center py-8 px-4 font-sans text-slate-800">

    <!-- 首頁狀態區 -->
    <div id="startScreen" class="w-full max-w-md flex flex-col items-center justify-center min-h-[60vh] gap-6">
        <i class="fa-solid fa-graduation-cap text-6xl text-blue-600 mb-2"></i>
        <h1 class="text-3xl font-black text-slate-800">AI 智慧單字卡</h1>
        <p class="text-slate-500 text-center text-sm px-6">搭載間隔重複演算法與 AI 智能解析<br>點擊下方按鈕開始練習</p>
        <button onclick="startApp()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-black text-lg shadow-lg transition-all active:scale-95 mt-4">
            <i class="fa-solid fa-play mr-2"></i>開始練習
        </button>
        <button onclick="toggleHelp()" class="text-slate-400 hover:text-slate-600 text-sm underline underline-offset-4">
            <i class="fa-solid fa-gear mr-1"></i>設定與說明
        </button>
    </div>

    <!-- 頂部資訊列 -->
    <div id="topBar" class="w-full max-w-md flex gap-2 mb-6 hidden">
        <div class="flex-grow flex items-center justify-center h-14 border border-blue-200 rounded-xl bg-white shadow-sm">
            <span class="text-lg font-black text-blue-600"><i class="fa-solid fa-book-open mr-2"></i>練習模式</span>
        </div>
        <button onclick="toggleHelp()" class="w-14 h-14 bg-white border border-slate-200 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-blue-500 transition-all flex items-center justify-center shadow-sm">
            <i class="fa-solid fa-gear text-2xl"></i>
        </button>
    </div>

    <!-- 數據統計區 -->
    <div id="statsArea" class="w-full max-w-md mb-6 hidden">
        <div class="grid grid-cols-5 gap-1.5 mb-4 text-center">
            <div class="bg-white border border-red-200 p-2 rounded-lg text-red-600"><span class="text-[10px] font-black uppercase tracking-tighter">Again</span><br><span id="countAgain" class="text-lg font-black">0</span></div>
            <div class="bg-white border border-orange-200 p-2 rounded-lg text-orange-600"><span class="text-[10px] font-black uppercase tracking-tighter">Hard</span><br><span id="countHard" class="text-lg font-black">0</span></div>
            <div class="bg-white border border-blue-200 p-2 rounded-lg text-blue-600"><span class="text-[10px] font-black uppercase tracking-tighter">Good</span><br><span id="countGood" class="text-lg font-black">0</span></div>
            <div class="bg-white border border-green-200 p-2 rounded-lg text-green-600"><span class="text-[10px] font-black uppercase tracking-tighter">Easy</span><br><span id="countEasy" class="text-lg font-black">0</span></div>
            <div class="bg-slate-100 border border-slate-300 p-2 rounded-lg text-slate-700"><span class="text-[10px] font-black uppercase tracking-tighter">總回答</span><br><span id="totalAnswered" class="text-lg font-black">0</span></div>
        </div>
        <div class="flex justify-between items-end mb-2 font-black text-sm uppercase">
            <span>剩餘: <span id="remainingCount" class="text-blue-600">0</span></span>
            <span id="progressPercent" class="text-blue-600 text-lg">0%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden shadow-inner"><div id="progressBar" class="bg-blue-500 h-3 w-0 transition-all duration-500"></div></div>
    </div>

    <!-- 練習完成獨立畫面 -->
    <div id="completionScreen" class="w-full max-w-md hidden bg-white rounded-3xl flex flex-col items-center justify-center p-8 shadow-2xl mt-4">
        <i class="fa-solid fa-trophy text-6xl text-yellow-500 mb-6 drop-shadow-md"></i>
        <h2 class="text-4xl font-black text-slate-800 mb-4">練習完成！</h2>
        <p class="text-slate-500 font-bold mb-8">你今天學習了 <span id="finalScore" class="text-blue-600 text-xl font-black">0</span> 次單字</p>
        <button onclick="resetQuiz()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-xl shadow-lg hover:bg-blue-700 transition-all">重新開始測驗</button>
    </div>

    <!-- 卡片本體 -->
    <div id="cardContainer" class="flip-card w-full max-w-md hidden">
        <div class="flip-card-inner" id="cardInner">
            <!-- 正面 -->
            <div class="flip-card-front" onclick="toggleFlip()">
                <div class="relative flex flex-col items-center">
                    <button onclick="speakText(event, 'front')" class="mb-6 p-4 bg-blue-600 hover:bg-blue-700 rounded-full text-white transition-all shadow-lg active:scale-90 z-10">
                        <i class="fa-solid fa-volume-high text-2xl"></i>
                    </button>
                    <div class="bg-white/90 backdrop-blur-md px-10 py-6 rounded-[2rem] shadow-2xl border border-white/50">
                        <h2 id="frontWord" class="text-5xl font-black text-slate-900 tracking-tight"></h2>
                    </div>
                    <p class="text-white/70 mt-8 font-bold text-sm tracking-widest"><i class="fa-solid fa-hand-pointer mr-2"></i>點擊或按空白鍵翻面</p>
                </div>
            </div>
            <!-- 背面 -->
            <div class="flip-card-back">
                <div class="glass-overlay text-white">
                    <div class="flex-grow overflow-y-auto pr-2 custom-scrollbar">
                        <h3 id="backTranslation" class="text-4xl font-black mb-2 drop-shadow-md"></h3>
                        <span id="backPos" class="inline-block px-3 py-1 bg-yellow-400 text-slate-900 font-black italic text-sm rounded-lg mb-4 shadow-md"></span>
                        
                        <div class="border-t border-white/30 my-4"></div>
                        
                        <div class="flex flex-col items-start gap-4 mb-4">
                            <div class="flex items-center gap-3">
                                <button onclick="speakText(event, 'back')" class="p-2.5 bg-white text-blue-700 rounded-full shadow-xl transition-all active:scale-90">
                                    <i class="fa-solid fa-volume-high text-sm"></i>
                                </button>
                                <p id="backSentence" class="text-xl font-bold leading-snug drop-shadow-sm"></p>
                            </div>
                            <p id="backSentenceTrans" class="text-lg font-medium text-white/80 ml-11"></p>
                        </div>

                        <!-- AI 擴充區塊 -->
                        <div class="border-t border-white/30 my-4"></div>
                        <button onclick="askAI(event)" id="btnAskAI" class="w-full py-2.5 mb-2 bg-gradient-to-r from-purple-500 to-indigo-600 hover:from-purple-600 hover:to-indigo-700 rounded-xl font-bold shadow-md transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> AI 幫我記
                        </button>
                        <div id="aiResponse" class="hidden bg-white/20 rounded-xl p-3 text-sm font-medium leading-relaxed border border-white/30 mb-2">
                            <!-- AI 回應 -->
                        </div>
                    </div>

                    <!-- 底部按鈕區 -->
                    <div class="grid grid-cols-4 gap-2 mt-4 pt-4 border-t border-white/20">
                        <button onclick="handleAction('again')" class="btn-action bg-red-600/90 hover:bg-red-600"><span class="key-hint">1</span>Again</button>
                        <button onclick="handleAction('hard')" class="btn-action bg-orange-500/90 hover:bg-orange-500"><span class="key-hint">2</span>Hard</button>
                        <button onclick="handleAction('good')" class="btn-action bg-blue-600/90 hover:bg-blue-600"><span class="key-hint">3</span>Good</button>
                        <button onclick="handleAction('easy')" class="btn-action bg-green-600/90 hover:bg-green-600"><span class="key-hint">4</span>Easy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 設定與說明 Modal -->
    <div id="helpModal" class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl text-left overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-800">⚙️ 設定與說明</h3>
                <button onclick="toggleHelp()" class="text-slate-400 hover:text-slate-700 text-2xl">&times;</button>
            </div>
            
            <div class="space-y-3 text-sm font-bold mb-8">
                <div class="flex gap-2"><kbd class="bg-slate-100 px-2 rounded shadow font-black">Space</kbd> 快速翻頁 / <kbd class="bg-slate-100 px-2 rounded shadow font-black">Enter</kbd> 快速朗讀</div>
                <div class="p-2.5 bg-red-50 rounded-lg border border-red-100 text-red-700">按數字鍵1 - Again: 第 2 個位置</div>
                <div class="p-2.5 bg-orange-50 rounded-lg border border-orange-100 text-orange-700">按數字鍵2 - Hard: 插入中間</div>
                <div class="p-2.5 bg-blue-50 rounded-lg border border-blue-100 text-blue-700">按數字鍵3 - Good: 移至最後</div>
                <div class="p-2.5 bg-green-50 rounded-lg border border-green-100 text-green-700">按數字鍵4 - Easy: 直接移除</div>
            </div>
            
            <button onclick="resetQuiz(event)" class="w-full py-3 bg-red-100 text-red-600 hover:bg-red-200 rounded-xl font-black transition-all mb-3 shadow-sm">清除所有進度並重新開始</button>
            <button onclick="toggleHelp()" class="w-full py-3 bg-slate-800 text-white hover:bg-slate-900 rounded-xl font-black uppercase tracking-widest shadow-md">關閉視窗</button>
        </div>
    </div>

    <!-- 訊息提示 -->
    <div id="toastMsg" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full font-bold shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-[60]">
        訊息
    </div>

    <script>
        const csvContent = `ability,"能力\nn.\nShe has the ability to solve complex problems.\n她有解決複雜問題的能力。"
abroad,"在國外\nadv.\nMy sister decided to study abroad in England.\n我姐姐決定去英國留學。"
absence,"缺席\nn.\nHis absence from the meeting was noticed by everyone.\n每個人都注意到了他沒來參加會議。"
accept,"接受\nv.\nPlease accept my sincere apology.\n請接受我誠摯的道歉。"
accident,"意外\nn.\nI met an old friend by accident at the airport.\n我在機場意外地遇到了一位老朋友。"
achieve,"達成；實現\nv.\nYou can achieve anything if you work hard enough.\n只要你夠努力，你可以實現任何事情。"
admire,"欽佩；欣賞\nv.\nI really admire your courage to speak the truth.\n我真的很欽佩你說出真相的勇氣。"
advantage,"優點；優勢\nn.\nBeing bilingual is a great advantage in the job market.\n會說兩種語言在就業市場上是一個很大的優勢。"
afford,"負擔得起\nv.\nWe can't afford to buy a new car this year.\n我們今年負擔不起買新車的費用。"
ancient,"古老的\nadj.\nThey visited the ancient temples in Rome.\n他們參觀了羅馬的古老寺廟。"`;

        let words = [], rawWords = [], initialTotal = 0, isFlipped = false;
        let stats = { again: 0, hard: 0, good: 0, easy: 0, total: 0 };
        const apiKey = ""; // 系統自動注入，無須手動填寫

        window.onload = function() {
            parseCSV(csvContent);
        };

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', '-translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', '-translate-y-4'), 2500);
        }

        function parseCSV(text) {
            rawWords = [];
            let row = [], field = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i], nextChar = text[i + 1];
                if (inQuotes) {
                    if (char === '"' && nextChar === '"') { field += '"'; i++; }
                    else if (char === '"') inQuotes = false;
                    else field += char;
                } else {
                    if (char === '"') inQuotes = true;
                    else if (char === ',') { row.push(field); field = ''; }
                    else if (char === '\n' || char === '\r') {
                        if (char === '\r' && nextChar === '\n') i++;
                        row.push(field); 
                        if (row.length >= 2) processRowData(row);
                        row = []; field = '';
                    } else field += char;
                }
            }
            if (field || row.length > 0) { row.push(field); if (row.length >= 2) processRowData(row); }
            if (rawWords.length > 0) {
                words = JSON.parse(JSON.stringify(rawWords));
                shuffleArray(words);
                initialTotal = words.length;
            }
        }

        function processRowData(row) {
            const word = row[0].trim();
            const details = row[1].split('\n').map(s => s.trim());
            rawWords.push({ word, trans: details[0]||"無翻譯", pos: details[1]||"", sent: details[2]||"", sentTrans: details[3]||"" });
        }

        function startApp() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('topBar').classList.remove('hidden');
            document.getElementById('statsArea').classList.remove('hidden');
            document.getElementById('cardContainer').classList.remove('hidden');
            document.getElementById('completionScreen').classList.add('hidden');
            
            const saved = localStorage.getItem('flashcard_progress');
            if (saved) {
                try {
                    const d = JSON.parse(saved);
                    if (d.words && d.words.length > 0) {
                        words = d.words; rawWords = d.rawWords; initialTotal = d.initialTotal; stats = d.stats;
                        showToast("已載入上次練習進度！");
                    }
                } catch(e) { localStorage.removeItem('flashcard_progress'); }
            }
            renderCard();
        }

        function renderCard() {
            if (!words.length) { 
                // 隱藏練習區，顯示獨立的完成畫面
                document.getElementById('cardContainer').classList.add('hidden');
                document.getElementById('statsArea').classList.add('hidden');
                document.getElementById('topBar').classList.add('hidden');
                document.getElementById('completionScreen').classList.remove('hidden');
                document.getElementById('finalScore').innerText = stats.total;
                localStorage.removeItem('flashcard_progress');
                return; 
            }

            const data = words[0];
            document.getElementById('frontWord').innerText = data.word;
            document.getElementById('backTranslation').innerText = data.trans;
            document.getElementById('backPos').innerText = data.pos;
            document.getElementById('backSentence').innerText = data.sent;
            document.getElementById('backSentenceTrans').innerText = data.sentTrans;
            document.getElementById('backPos').style.display = data.pos ? 'inline-block' : 'none';
            
            document.getElementById('aiResponse').classList.add('hidden');
            document.getElementById('aiResponse').innerHTML = '';
            document.getElementById('btnAskAI').style.display = 'flex';

            updateStatsUI();
            if (!isFlipped) speak(data.word);
        }

        function handleAction(type) {
            if (!words.length) return;
            const currentCard = words.shift();
            stats.total++; stats[type]++;
            if (type === 'again') words.splice(1, 0, currentCard);
            else if (type === 'hard') words.splice(Math.floor(words.length / 2), 0, currentCard);
            else if (type === 'good') words.push(currentCard);
            
            isFlipped = false;
            document.getElementById('cardInner').parentElement.classList.remove('flipped');
            setTimeout(() => { renderCard(); saveProgress(); }, 300);
        }

        function toggleFlip() { 
            if (isFlipped) return; 
            isFlipped = true;
            document.getElementById('cardInner').parentElement.classList.add('flipped');
            setTimeout(() => { if (words.length) speak(words[0].sent); }, 450);
        }

        function updateStatsUI() {
            document.getElementById('countAgain').innerText = stats.again;
            document.getElementById('countHard').innerText = stats.hard;
            document.getElementById('countGood').innerText = stats.good;
            document.getElementById('countEasy').innerText = stats.easy;
            document.getElementById('totalAnswered').innerText = stats.total;
            document.getElementById('remainingCount').innerText = words.length;
            const p = initialTotal > 0 ? ((initialTotal - words.length) / initialTotal) * 100 : 0;
            document.getElementById('progressBar').style.width = p + '%';
            document.getElementById('progressPercent').innerText = Math.round(p) + '%';
        }

        // ================== AI 核心邏輯 (含自動重試機制) ==================
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return response;
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function askAI(event) {
            event.stopPropagation();
            const currentWord = words[0].word;
            const btnAI = document.getElementById('btnAskAI');
            const aiBox = document.getElementById('aiResponse');
            
            btnAI.style.display = 'none';
            aiBox.classList.remove('hidden');
            aiBox.classList.add('ai-loading');
            aiBox.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> AI 正在為你生成專屬記憶法...';

            try {
                // 使用系統預設的 API 引擎與密鑰
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{
                        parts: [{
                            text: `請扮演專業幽默的英文家教。針對單字 "${currentWord}"，提供：1. 一個有趣的中文諧音記憶法或字根字首解析。2. 兩個常見同義詞。請用 HTML 格式回傳（使用 <b> 標籤強調重點，使用 <br> 換行），不要包含 markdown 語法，字數控制在 80 字以內，語氣要輕鬆鼓勵。`
                        }]
                    }]
                };

                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "無法生成內容，請重試。";
                
                aiBox.classList.remove('ai-loading');
                aiBox.innerHTML = `<div>${aiText}</div>`;
            } catch (error) {
                console.error("API 錯誤:", error);
                aiBox.classList.remove('ai-loading');
                aiBox.innerHTML = `<span class="text-red-300"><i class="fa-solid fa-triangle-exclamation mr-1"></i> 生成失敗：請確認網路狀態或稍後再試。</span>`;
                btnAI.style.display = 'flex';
            }
        }
        // ================================================================

        function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
        function speak(t) { 
            if (!t) return; 
            window.speechSynthesis.cancel(); 
            const m = new SpeechSynthesisUtterance(t); 
            m.lang = 'en-US'; m.rate = 0.9; 
            window.speechSynthesis.speak(m); 
        }
        function speakText(e, type) { e.stopPropagation(); speak(type === 'front' ? words[0].word : words[0].sent); }
        function saveProgress() { localStorage.setItem('flashcard_progress', JSON.stringify({ words, rawWords, initialTotal, stats })); }
        
        function resetQuiz(e) { 
            if(e) e.stopPropagation(); 
            localStorage.removeItem('flashcard_progress'); 
            
            // 重新初始化狀態
            stats = { again: 0, hard: 0, good: 0, easy: 0, total: 0 };
            isFlipped = false;
            document.getElementById('cardInner').parentElement.classList.remove('flipped');
            document.getElementById('helpModal').classList.add('opacity-0', 'pointer-events-none');
            
            parseCSV(csvContent);
            
            // 回到首頁畫面並隱藏所有其他視窗
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('topBar').classList.add('hidden');
            document.getElementById('statsArea').classList.add('hidden');
            document.getElementById('cardContainer').classList.add('hidden');
            document.getElementById('completionScreen').classList.add('hidden');
            showToast("測驗進度已重置！");
        }
        
        function toggleHelp() { 
            const m = document.getElementById('helpModal'); 
            const isOpen = m.classList.contains('opacity-100'); 
            m.classList.toggle('opacity-0', isOpen); 
            m.classList.toggle('pointer-events-none', isOpen); 
            m.classList.toggle('opacity-100', !isOpen); 
            m.classList.toggle('pointer-events-auto', !isOpen); 
        }

        document.addEventListener('keydown', (e) => {
            if (!words.length || document.getElementById('startScreen').classList.contains('hidden') === false) return;
            if (e.target.tagName === 'INPUT') return; 

            if (e.code === 'Space') { e.preventDefault(); if (!isFlipped) toggleFlip(); }
            else if (e.key === 'Enter') { e.preventDefault(); speak(isFlipped ? words[0].sent : words[0].word); }
            else if (isFlipped && ['1','2','3','4'].includes(e.key)) {
                const types = { '1': 'again', '2': 'hard', '3': 'good', '4': 'easy' };
                handleAction(types[e.key]);
            }
        });
    </script>
</body>
</html>
