<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma 的計算</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            position: relative;
            min-height: 550px;
        }
        h1 { text-align: center; color: #222; margin: 0; font-size: 2rem; }
        
        .spacer { height: 40px; } /* 第二列空白 */

        .input-group { margin-bottom: 20px; font-size: 1.1rem; color: #444; }
        
        .math-row { 
            margin-top: 40px; 
            font-size: 1.4rem; 
            display: flex; 
            align-items: center; 
            flex-wrap: wrap;
            min-height: 60px;
        }

        input[type="number"] {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }
        input[type="number"]:focus { border-color: #007AFF; box-shadow: 0 0 0 2px rgba(0,122,255,0.2); }
        
        .ans-input { width: 140px; margin: 0 15px; border: 2px solid #007AFF !important; }
        
        .btn-submit {
            background-color: #007AFF;
            color: white;
            border: none;
            padding: 11px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-submit:hover { background-color: #0056b3; }
        
        /* 下方中央提示 */
        #message {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin-top: 70px;
            min-height: 2.5rem;
        }
        .correct { color: #28a745; }
        .wrong { color: #dc3545; }
        
        /* 右下角控制區 */
        .footer-controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            text-align: right;
        }
        #correct-ans-display { 
            color: #dc3545; 
            font-weight: bold; 
            margin-bottom: 15px; 
            display: none; 
            font-size: 1.2rem;
        }
        .btn-reset {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-reset:hover { background-color: #5a6268; }
    </style>
</head>
<body>

<div class="container">
    <h1>$$\Sigma \text{ 的計算}$$</h1>

    <div class="spacer"></div>

    <div class="input-group">
        <span>起始值 (x)：</span>
        <input type="number" id="start-num" oninput="renderDynamicMath()" placeholder="請輸入 x">
    </div>
    <div class="input-group">
        <span>結束值 (y)：</span>
        <input type="number" id="end-num" oninput="renderDynamicMath()" placeholder="請輸入 y">
    </div>

    <div class="math-row">
        <span id="formula-text">\( x^2 - (x+1)^2 + (x+2)^2 \dots = \)</span>
        <input type="number" id="user-answer" class="ans-input" placeholder="填入答案">
        <button class="btn-submit" onclick="checkAnswer()">提交</button>
    </div>

    <div id="message"></div>

    <div class="footer-controls">
        <div id="correct-ans-display">正確解答：<span id="true-val"></span></div>
        <button class="btn-reset" onclick="resetForm()">重新輸入</button>
    </div>
</div>

<script>
    // 動態渲染算式
    function renderDynamicMath() {
        const xVal = document.getElementById('start-num').value;
        const yVal = document.getElementById('end-num').value;
        const formulaElem = document.getElementById('formula-text');

        if (xVal === "") {
            formulaElem.innerHTML = "\\( x^2 - (x+1)^2 + (x+2)^2 \\dots = \\)";
            MathJax.typeset();
            return;
        }

        const x = parseInt(xVal);
        let latex = `${x}^2 - ${x+1}^2 + ${x+2}^2 - ${x+3}^2 + \\dots`;

        // 如果輸入了 y 值，自動補上最後一項
        if (yVal !== "") {
            const y = parseInt(yVal);
            if (y >= x) {
                const lastSign = ((y - x) % 2 === 0) ? "+" : "-";
                latex += ` ${lastSign} ${y}^2`;
            }
        }

        formulaElem.innerHTML = `\\( ${latex} = \\)`;
        MathJax.typeset();
        clearFeedback();
    }

    function checkAnswer() {
        const x = parseInt(document.getElementById('start-num').value);
        const y = parseInt(document.getElementById('end-num').value);
        const userAns = parseInt(document.getElementById('user-answer').value);
        
        if (isNaN(x) || isNaN(y) || isNaN(userAns)) {
            alert("請完整輸入數字與答案！");
            return;
        }

        // 計算邏輯
        let result = 0;
        let positive = true;
        for (let i = x; i <= y; i++) {
            result += (i * i * (positive ? 1 : -1));
            positive = !positive;
        }

        const msgElem = document.getElementById('message');
        if (userAns === result) {
            msgElem.innerHTML = '<span class="correct">恭喜您！答對了！</span>';
            document.getElementById('correct-ans-display').style.display = 'none';
        } else {
            msgElem.innerHTML = '<span class="wrong">錯了喔！</span>';
            document.getElementById('true-val').innerText = result;
            document.getElementById('correct-ans-display').style.display = 'block';
        }
    }

    function clearFeedback() {
        document.getElementById('message').innerHTML = "";
        document.getElementById('correct-ans-display').style.display = 'none';
    }

    function resetForm() {
        document.getElementById('start-num').value = "";
        document.getElementById('end-num').value = "";
        document.getElementById('user-answer').value = "";
        renderDynamicMath();
    }
</script>

</body>
</html>
